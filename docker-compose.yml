services:
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    privileged: false
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 15M

  api1:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: [
      "-Xmx48m", 
      "-Xms48m", 
      "-Djdk.virtualThreadScheduler.parallelism=1",
      "-XX:MaxDirectMemorySize=128M"
    ]
    environment:
      - SEARCH_INDEX_PATH=/data/references.bin
    volumes:
      - ./references.bin:/data/references.bin:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 167M

  api2:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: [
      "-Xmx48m", 
      "-Xms48m", 
      "-Djdk.virtualThreadScheduler.parallelism=1",
      "-XX:MaxDirectMemorySize=128M"
    ]
    environment:
      - SEARCH_INDEX_PATH=/data/references.bin
    volumes:
      - ./references.bin:/data/references.bin:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 167M


networks:
  default:
    driver: bridge
    name: fraud-detector-network
