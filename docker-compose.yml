services:
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    privileged: false
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 20M

  api:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: [
      "-Xmx100m", 
      "-Xms100m", 
      "-XX:+UseSerialGC", 
      "-Djdk.virtualThreadScheduler.parallelism=1"
    ]
    environment:
      - VPTREE_PATH=/data/references.vpt
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.95'
          memory: 310M

networks:
  default:
    driver: bridge
    name: fraud-detector-network
