services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 30M

  api1:
    build:
      context: .
      dockerfile: Dockerfile.native
    environment:
      - VPTREE_PATH=/data/references.vpt
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 150M

  api2:
    build:
      context: .
      dockerfile: Dockerfile.native
    environment:
      - VPTREE_PATH=/data/references.vpt
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 150M

networks:
  default:
    name: fraud-detector-network
