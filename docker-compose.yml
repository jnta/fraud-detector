services:
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    privileged: false
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 20M

  api1:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: ["-Xmx32m", "-XX:MaxDirectMemorySize=10m"]
    environment:
      - VPTREE_PATH=/data/references.vpt
      - JAVA_OPTS=-Xmx32m -Xms32m -XX:MaxDirectMemorySize=10m
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 165M

  api2:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: ["-Xmx32m", "-XX:MaxDirectMemorySize=10m"]
    environment:
      - VPTREE_PATH=/data/references.vpt
      - JAVA_OPTS=-Xmx32m -Xms32m -XX:MaxDirectMemorySize=10m
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 165M

networks:
  default:
    driver: bridge
    name: fraud-detector-network
