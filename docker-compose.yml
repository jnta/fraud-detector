services:
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    privileged: false
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 30M

  api1:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: [
      "-Xmx80m", 
      "-Xms80m", 
      "-Djdk.virtualThreadScheduler.parallelism=1"
    ]
    environment:
      - VPTREE_PATH=/data/references.vpt
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 160M

  api2:
    build:
      context: .
      dockerfile: Dockerfile.native
    platform: linux/amd64
    privileged: false
    command: [
      "-Xmx80m", 
      "-Xms80m", 
      "-Djdk.virtualThreadScheduler.parallelism=1"
    ]
    environment:
      - VPTREE_PATH=/data/references.vpt
    volumes:
      - ./references.vpt:/data/references.vpt:ro
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 160M

networks:
  default:
    driver: bridge
    name: fraud-detector-network
